<!DOCTYPE html>
<!-- Change lang to "en" (or another registered locale) to switch language -->
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chasket — テンプレートファーストな Web Components</title>
  <meta name="description" content="Chasketはネイティブ Web Components にコンパイルされる、ランタイムゼロのテンプレートファースト言語です。" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="google" content="notranslate" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens (penetrate Shadow DOM) ── */
    :root {
      --c-primary: #6C5CE7;
      --c-primary-light: #a29bfe;
      --c-accent: #00B894;
      --c-accent-light: #55efc4;
      --c-bg: #0a0a0f;
      --c-bg-card: #12121a;
      --c-bg-code: #0d0d14;
      --c-surface: #1a1a26;
      --c-border: #2a2a3a;
      --c-text: #e4e4ed;
      --c-text-dim: #9898ab;
      --font: 'Inter', 'Inter Fallback', 'Noto Sans JP', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      --max-w: 70rem;
      --space-section: clamp(4rem, 8vw, 6.25rem);
      --space-page: clamp(1rem, 3vw, 1.5rem);
      --radius: 0.75rem;
      --radius-lg: 1rem;
    }

    /* ── Fallback font metrics to reduce CLS during font swap ── */
    @font-face {
      font-family: 'Inter Fallback';
      src: local('Arial');
      size-adjust: 107%;
      ascent-override: 90%;
      descent-override: 22%;
      line-gap-override: 0%;
    }

    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scrollbar-gutter: stable; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font);
      background: var(--c-bg);
      color: var(--c-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    code { font-family: var(--mono); }
  </style>

  <!-- i18n: load BEFORE the component bundle -->
  <script src="/i18n/i18n.js"></script>
  <script src="/i18n/ja.js"></script>
  <script src="/i18n/en.js"></script>
</head>
<body>
  <csk-shell></csk-shell>
  <script src="/dist/chasket-bundle.js"></script>
</body>
</html>
