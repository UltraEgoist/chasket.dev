<!DOCTYPE html>
<!-- Change lang to "en" (or another registered locale) to switch language -->
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chasket — テンプレートファーストな Web Components</title>
  <meta name="description" content="Chasketはネイティブ Web Components にコンパイルされる、ランタイムゼロのテンプレートファースト言語です。" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="google" content="notranslate" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://chasket.dev/" />
  <meta property="og:title" content="Chasket — Template-First Web Components" />
  <meta property="og:description" content="Zero-runtime, template-first language that compiles to native Web Components." />
  <meta property="og:image" content="https://chasket.dev/public/images/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:locale" content="ja_JP" />
  <meta property="og:locale:alternate" content="en_US" />
  <meta property="og:site_name" content="Chasket" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://chasket.dev/" />
  <meta name="twitter:title" content="Chasket — Template-First Web Components" />
  <meta name="twitter:description" content="Zero-runtime, template-first language that compiles to native Web Components." />
  <meta name="twitter:image" content="https://chasket.dev/public/images/og-image.png" />

  <!-- Canonical -->
  <link rel="canonical" href="https://chasket.dev/" />
  <link rel="icon" type="image/svg+xml" href="/public/icons/favicon.svg" />
  <link rel="icon" type="image/png" sizes="48x48" href="/public/icons/favicon-48x48.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/public/icons/favicon-32x32.png" />
  <link rel="icon" href="/public/icons/favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" sizes="180x180" href="/public/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/public/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Latin フォント: swap（テキスト即表示→フォント適用時に切替） -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- 日本語フォント: optional（キャッシュ済みなら使用、未取得なら system-ui で描画し裏で取得） -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=optional" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=optional" rel="stylesheet" />

  <!-- JS バンドルの先読み（fetchだけ先行、実行はbodyで） -->
  <link rel="preload" as="script" href="/dist/core-layout.js" />
  <link rel="preload" as="script" href="/dist/core-shared.js" />
  <script src="/scripts/preload-route.js"></script>
  <style>
    /* ── Design tokens (penetrate Shadow DOM) ── */
    :root {
      --c-primary: #6C5CE7;
      --c-primary-light: #a29bfe;
      --c-accent: #00B894;
      --c-accent-light: #55efc4;
      --c-bg: #0a0a0f;
      --c-bg-card: #12121a;
      --c-bg-code: #0d0d14;
      --c-surface: #1a1a26;
      --c-border: #2a2a3a;
      --c-text: #e4e4ed;
      --c-text-dim: #9898ab;
      --font: 'Inter', 'Inter Fallback', 'Noto Sans JP', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      --max-w: 70rem;
      --space-section: clamp(4rem, 8vw, 6.25rem);
      --space-page: clamp(1rem, 3vw, 1.5rem);
      --radius: 0.75rem;
      --radius-lg: 1rem;
    }

    /* ── Fallback font metrics to reduce CLS during font swap ── */
    @font-face {
      font-family: 'Inter Fallback';
      src: local('Arial');
      size-adjust: 107%;
      ascent-override: 90%;
      descent-override: 22%;
      line-gap-override: 0%;
    }

    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scrollbar-gutter: stable; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font);
      background: var(--c-bg);
      color: var(--c-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    code { font-family: var(--mono); }
  </style>

  <!-- i18n: load BEFORE the component bundle -->
  <script src="/i18n/i18n.js"></script>
  <script src="/i18n/ja.js"></script>
  <script src="/i18n/en.js"></script>
</head>
<body>
  <csk-shell>
    <!--
      スケルトン: JSが起動する前にLCP要素（h1）を即座に描画する。
      csk-shell (shadow: none) のテンプレートが描画されると、この子要素は上書きされる。
    -->
    <div class="skeleton-hero" id="csk-skeleton">
      <div class="skeleton-content">
        <div class="skeleton-badge">v0.3.0 — VSCode Marketplace 公開中</div>
        <h1 class="skeleton-h1">テンプレートファーストな<br><span class="skeleton-gradient">Web Components</span> 言語</h1>
        <p class="skeleton-sub">組み込みのリアクティビティ、型チェック、スコープ付きCSSを備えたシングルファイルコンポーネントを記述。ランタイムゼロでネイティブ HTMLElement クラスにコンパイル。</p>
      </div>
    </div>
  </csk-shell>
  <script src="/scripts/skeleton-i18n.js"></script>
  <style>
    /* スケルトンスタイル — LCP描画後にJSが上書きするまでの表示 */
    .skeleton-hero {
      display: flex; align-items: center; justify-content: center;
      min-height: max(70vh, 28rem); text-align: center;
      padding: clamp(6rem, 12vw, 8rem) clamp(1rem, 3vw, 1.5rem) clamp(3rem, 6vw, 5rem);
    }
    .skeleton-content { max-width: 45rem; width: 100%; }
    .skeleton-badge {
      display: inline-block; font-size: clamp(0.7rem, 0.9vw, 0.8rem); font-weight: 500;
      padding: 0.375rem 1rem; border-radius: 999px;
      background: rgba(108,92,231,0.15); color: #a29bfe;
      border: 1px solid rgba(108,92,231,0.3);
      margin-bottom: clamp(1.25rem, 2.5vw, 1.75rem);
    }
    .skeleton-h1 {
      font-size: clamp(1.75rem, 5vw, 3.5rem); font-weight: 800;
      line-height: 1.15; letter-spacing: -0.03em;
      margin-bottom: clamp(0.75rem, 1.5vw, 1.25rem);
      color: #e4e4ed; word-break: keep-all;
    }
    .skeleton-gradient {
      background: linear-gradient(135deg, #a29bfe, #55efc4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .skeleton-sub {
      font-size: clamp(0.875rem, 1.2vw, 1.1rem); color: #9898ab;
      max-width: 35rem; margin: 0 auto; line-height: 1.65;
    }
  </style>
  <!-- コアバンドル: レイアウト（navbar, footer, shell）と共有コンポーネント -->
  <script src="/dist/core-layout.js"></script>
  <script src="/dist/core-shared.js"></script>
  <!-- ページバンドルは csk-shell が動的にロードする -->
</body>
</html>
